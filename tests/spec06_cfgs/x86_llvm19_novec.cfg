# This is a sample config file. It was tested with:
#
#      Compiler name/version:       [gcc, 4.1 release ]
#      Operating system version:    [SLES9 SP3 for AMD64]
#      Operating system version:    [SUSE 10.1 for AMD64]
#      Hardware:                    [Opteron]
#
# If your platform uses different versions, different

# hardware or operates in a different mode (for
# example, 32- vs. 64-bit mode), there is the possibiliy
# that this configuration file may not work as-is.
#
# Note that issues with compilation should be directed
# to the compiler vendor. Information about SPEC techncial
# support can be found in the techsupport document in the
# Docs directory of your benchmark installation.
#
# Also note that this is a sample configuration. It
# is expected to work for the environment in which
# it was tested; it is not guaranteed that this is
# the config file that will provide the best performance.
#
# At the time this was written, July 2006, gcc 4.2 had not yet been
# released. gfortran 4.2 is expected to be the first gcc compiler
# capable of running SPECfp2006. As this config file is for the
# currently released gcc 4.1, no provision is made for running SPECfp2006
#
# Note that you might find a more recent config file for
# your platform with the posted results at
# www.spec.org/cpu2006
####################################################################
# AMD64 (64-bit) FSF's gcc 4.1 config file 
# Config file for CPU2006 int base only
#####################################################################

ignore_errors = yes
tune          = base
ext           = x86_llvm19_novec_test
output_format = asc, txt, Screen
reportable    = 1
teeout        = yes
teerunout     = yes
hw_avail = Dec-9999
license_num = 9999
test_sponsor = Turbo Computers
prepared_by = 
tester      = PackSPECtester
test_date = Dec-9999
makeflags = -j`nproc`

default=default=default=default:
#####################################################################
#
# Compiler selection
#
#####################################################################

COMPILER_PATH = ${LLVM_INSTALL_PATH}


CC           = $(COMPILER_PATH)/bin/clang
CXX          = $(COMPILER_PATH)/bin/clang++
FC           = $(COMPILER_PATH)/bin/flang-new
#FC           =/home/asus/classic_flang/bin/flang

## HW config
hw_model     = 11th Gen Intel(R) Core(TM) i9-11900K @ 3.50GHz
hw_cpu_name  = 11th Gen Intel(R) Core(TM) i9-11900K @ 3.50GHz
hw_cpu_char  =
hw_cpu_mhz   = 5300
hw_fpu       = Integrated
hw_nchips	= 1
hw_ncores	= 8
hw_ncoresperchip= 8
hw_nthreadspercore = 2
hw_ncpuorder = 1 chip
hw_pcache    = 48 KB I + 32 KB D on chip per chip
hw_scache    = 512 MB I+D on chip per chip
hw_tcache    = 16 MiB L3 on chip per core
hw_ocache    = None
hw_memory	= 125 GiB
hw_disk  	= SATA
hw_vendor	= Tyan

## SW config
sw_os        = Ubuntu 22.04
sw_file      = ext3
sw_state     = runlevel 3
sw_compiler  = clang , clang++ & flang 18.1.6
sw_avail = Dec-9999
sw_other = None
sw_auto_parallel = No
sw_base_ptrsize = 64-bit
sw_peak_ptrsize = Not Applicable

#####################################################################
# Optimization
#####################################################################

## Base is low opt
default=default=default:
   COPTIMIZE                  = -O3 -flto -ffast-math  -march=raptorlake  -mllvm -vectorize-loops=false -mllvm -vectorize-slp=false
   CXXOPTIMIZE                = -O3 -flto -ffast-math  -march=raptorlake  -mllvm -vectorize-loops=false -mllvm -vectorize-slp=false
   FOPTIMIZE                  = -O3 -flto -ffast-math  -march=raptorlake  -mllvm -vectorize-loops=false -mllvm -vectorize-slp=false
   LDOPTIMIZE                 = 
   EXTRA_LIBS                 = -lpthread -ldl -lm  
   EXTRA_LDFLAGS              = -fuse-ld=lld  -Wl,-mllvm=-vectorize-loops=false,-mllvm=-vectorize-slp=false

default:
EXTRA_CPORTABILITY = -DSPEC_LP64 -Wno-int-conversion
EXTRA_CXXPORTABILITY = -DSPEC_LP64 -Wno-int-conversion
EXTRA_FPORTABILITY = -DSPEC_LP64

#####################################################################
# 32/64 bit Portability Flags - all
#####################################################################

default=default=default=default:
notes25= PORTABILITY=-DSPEC_CPU_LP64 is applied to all benchmarks in base.
PORTABILITY = -DSPEC_CPU_LP64

#####################################################################
# Portability Flags - INT
#####################################################################

400.perlbench=default=default=default:
# Pick one of the defines below, or the other
notes35    = 400.perlbench: -DSPEC_CPU_LINUX_X64
CPORTABILITY = -DSPEC_CPU_LINUX_X64 -ansi -DSPEC_CPU_NO_HAS_SIGSETJMP

453.povray=default=default=default:
CXXPORTABILITY = -std=c++11

462.libquantum=default=default=default:
notes60= 462.libquantum: -DSPEC_CPU_LINUX
CPORTABILITY=  -DSPEC_CPU_LINUX

483.xalancbmk=default=default=default:
CXXPORTABILITY= -DSPEC_CPU_LINUX -include cstring -Wno-c++11-narrowing -include ctime -fdelayed-template-parsing 

#####################################################################
# Portability Flags - FP
#####################################################################
410.bwaves=default=default=default:


416.gamess=default=default=default:


444.namd=default=default=default:
CXXPORTABILITY = -Wno-register

447.dealII=default=default=default:
CXXPORTABILITY = -fpermissive -include cstring -include stddef.h -include cstdlib -std=c++98

450.soplex=default=default=default:
CXXPORTABILITY = -std=c++98

456.hmmer=default=default=default:
CPORTABILITY = -Wno-implicit-function-declaration

465.tonto=default=default=default:
# FPORTABILITY = -ffree-form -ffixed-form
FPORTABILITY = -std=f2018

473.astar=default=default=default:
CXXPORTABILITY = -Wno-reserved-user-defined-literal

481.wrf=default=default=default:
CPORTABILITY = -DSPEC_CPU_CASE_FLAG -DSPEC_CPU_LINUX -Wno-implicit-int -Wno-implicit-function-declaration
#FOPTIMIZE       = -fno-backtrace
#FPORTABILITY = -std=legacy
FPORTABILITY = -std=f2018

