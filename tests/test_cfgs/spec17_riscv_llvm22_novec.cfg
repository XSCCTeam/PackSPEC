#------------------------------------------------------------------------------
# SPEC CPU2017 config file for SPECspeed / Intel compilers / Linux x86_64
#------------------------------------------------------------------------------
# 
# Usage: (1) Copy this to a new name
#             cd $SPEC/config
#             cp Example-x.cfg myname.cfg
#        (2) Change items that are marked 'EDIT' (search for it)
# 
# SPEC tested this config file with:
#  Compiler:  Intel(R) C/C++ and Fortran 17.0 Update 1 64bit Compilers for Linux
#  OS:        Redhat Enterprise Linux 7.2, GLIBC 2.17
#  Hardware:  Intel(R) Core(TM) i7-4790 w/ 32GB RAM
#             This file is configured for x86_64 processors with a compatible feature set
#             for the Intel(R) Compiler.
#               x86_64 processors with compiler compatible feature set
#                  *See: icc --help for compiler help and -x toggles for feature sets
#                  *This file uses the line 'SSE = -xHOST' for host feature set targeting
#               If your system supports CORE-AVX512 or newer isa extensions:
#                  *Please consider using a newer compiler release than Intel(R) Compiler
#                   17.0 Update 1 if available.
#                  *Alternately, removing -xHOST from the line 'SSE = -xHOST'
#                   may allow for better funtionality. This is untested.
#
# If you have different software or hardware, this config file may not work.
# You may find a better config file for your system next to posted results:
#     http://www.spec.org/cpu2017/results
#
# Compiler issues: Contact your compiler vendor, not SPEC.
# For SPEC help:   http://www.spec.org/cpu2017/Docs/techsupport.html
#------------------------------------------------------------------------------


#--------- Label --------------------------------------------------------------
# Arbitrary string to tag binaries 
#                  Two Suggestions: # (1) EDIT this label as you try new ideas.
label      =  riscv-SpacemiT-x60-llvm22


#--------- Preprocessor -------------------------------------------------------
%ifndef %{build_ncpus}         # EDIT to adjust number of simultaneous compiles.
%   define  build_ncpus 4     #      Or, you can set it on the command line: 
%endif                         #      'runcpu --define build_ncpus=nn'


#--------- Global Settings ----------------------------------------------------
# For info, see:
#            https://www.spec.org/cpu2017/Docs/config.html#fieldname  
#   Example: https://www.spec.org/pu2017/Docs/config.html#tune

action               = validate
command_add_redirect = 1
line_width           = 1020
log_line_width       = 1020
makeflags            = -j%{build_ncpus}
output_format        = txt,html,cfg,pdf,csv
preenv               = 1
tune                 = base
bench_post_setup     = sync
# parallel_test        = 0
mean_anyway          = 1
reportable           = 0
ignore_errors        = 1

# EDIT You may wish to set OpenMP stack size to something else... 128MB has been a sweet spot for 
#      32bit builds in the past, 192MB has been good for 64bit builds.
# preENV_OMP_STACKSIZE = 192M

# EDIT You may wish the set affinitization evnironment variables
# More information: Thread Affinity Interface (Linux* and Windows*) https://software.intel.com/en-us/node/684320
#%ifdef %{intspeedaffinity}
#preENV_KMP_AFFINITY    = granularity=fine,scatter
#%else
#preENV_KMP_AFFINITY    = granularity=fine,compact,1,0
#%endif

# EDIT You may wish to set additional directories to the runtime library path
#preENV_LD_LIBRARY_PATH = /opt/intel/compilers_and_libraries_2017/linux/lib/intel64

#Reference the flags files
#flagsurl1=$[top]/config/flags/Intel-ic17.0-official-linux64-revE.xml
%ifdef %{default-platform-flags}
#flagsurl2=Default-Platform-Flags.xml
%endif
default:
#EDIT consider numactl for multisocket systems
# submit       = taskset -c 5  $command
#--------- Compilers ----------------------------------------------------------
# TODO Set the paths to your compiler, GNU toolchain, and jemalloc installations
COMPILER_PATH      = /home/wll/sdbdata/llvm22.1.0/installed/riscv_llvm
JEMALLOC_PATH      = /home/wll/sdbdata/perfmatrix/toolchains_libs/jemalloc-5.2.1-riscv-installed
GCC_TOOLCHAIN_PATH = /home/wll/sdbdata/perfmatrix/toolchains_libs/gnu-riscv64-12.2

intspeed,fpspeed,intrate,fprate:
   CC           = $(COMPILER_PATH)/bin/clang --target=riscv64-unknown-linux-gnu --gcc-toolchain=$(GCC_TOOLCHAIN_PATH) --sysroot=$(GCC_TOOLCHAIN_PATH)/sysroot -std=c99
   CXX          = $(COMPILER_PATH)/bin/clang++ --target=riscv64-unknown-linux-gnu --gcc-toolchain=$(GCC_TOOLCHAIN_PATH) --sysroot=$(GCC_TOOLCHAIN_PATH)/sysroot -std=c++03
   FC           = $(COMPILER_PATH)/bin/flang-new --target=riscv64-unknown-linux-gnu --gcc-toolchain=$(GCC_TOOLCHAIN_PATH) --sysroot=$(GCC_TOOLCHAIN_PATH)/sysroot

   # How to say "Show me your version, please"
   CC_VERSION_OPTION       = --version
   CXX_VERSION_OPTION      = --version
   FC_VERSION_OPTION       = --version


#--------- Portability --------------------------------------------------------

intspeed,fpspeed,intrate,fprate:
   PORTABILITY      = -DSPEC_LP64

# rate
500.perlbench_r:
   CPORTABILITY      = -DSPEC_LINUX_X64 -fno-fast-math

502.gcc_r:
   LDCFLAGS          =  -z muldefs

525.x264_r:
   LDCFLAGS          =  -z muldefs

520.omnetpp_r:
   CXXPORTABILITY    = -std=c++98

521.wrf_r:
   CPORTABILITY      = -DSPEC_CASE_FLAG
   FPORTABILITY      = -fconvert=big-endian 

523.xalancbmk_r:
    CXXPORTABILITY   = -DSPEC_LINUX -D_FILE_OFFSET_BITS=64 -std=gnu++03 -fdelayed-template-parsing -D_GLIBCXX_USE_CXX11_ABI=0
   
527.cam4_r:
   CPORTABILITY      = -Wno-int-conversion -std=gnu89 -Dlower_case -DFORTRAN_UNDERSCORE  -Dappend_utils -Wno-error=implicit-int -Wno-error=implicit-function-declaration -DSPEC_LP64 -Dlinux -Dsun

526.blender_r:  #lang='CXX,C'
   PORTABILITY       = -funsigned-char -DSPEC_LINUX
   CPORTABILITY      = -std=gnu89 -DSPEC_LP64 -D__LITTLE_ENDIAN__ -Wno-error=narrowing
   CXXPORTABILITY    = -std=c++11 -Wno-error=narrowing

508.namd_r:
   PORTABILITY       = -std=c++98

510.parest_r: 
   CXXPORTABILITY    =  -std=c++98

511.povray_r:
   CXXPORTABILITY    = -fno-fast-math
   CPORTABILITY      = -fno-fast-math

# speed
600.perlbench_s:
   CPORTABILITY     = -DSPEC_LINUX_X64 -fno-fast-math

602.gcc_s:
   LDCFLAGS        =  -z muldefs

625.x264_s:
   LDCFLAGS        =  -z muldefs

620.omnetpp_s:
   CXXPORTABILITY  = -std=c++98

621.wrf_s:
   CPORTABILITY     = -DSPEC_CASE_FLAG
   FPORTABILITY     = -fconvert=big-endian 

623.xalancbmk_s:
    CXXPORTABILITY = -DSPEC_LINUX -D_FILE_OFFSET_BITS=64 -std=gnu++03 -fdelayed-template-parsing -D_GLIBCXX_USE_CXX11_ABI=0
   
627.cam4_s:  #lang='F,C'
    PORTABILITY        = -DSPEC_CASE_FLAG
    CPORTABILITY       = -Wno-implicit-int 

628.pop2_s:
   CPORTABILITY     = -DSPEC_CASE_FLAG
   FPORTABILITY     = -fconvert=big-endian   


#--------- How Many CPUs? -----------------------------------------------------
# Both SPECrate and SPECspeed can test multiple chips / cores / hw threads
#    - For SPECspeed, you set the number of threads.
# See: https://www.spec.org/cpu2017/Docs/system-requirements.html#MultipleCPUs
#
#    q. How many should I set?
#    a. Unknown, you will have to try it and see!
#
# To get you started, some suggestions:
#
#     threads - This config file sets a starting point.  You could try raising
#               it.  A higher thread count is much more likely to be useful for
#               fpspeed than for intspeed.
#
default:
   threads          = 1  # EDIT to change number of OpenMP threads (see above)
   copies           = 1


# submit = numactl --membind=0 --physcpubind=$SPECCOPYNUM $command

#-------- Tuning Flags ----------------------------------------------

# bind0	= numactl -m 0 --physcpubind=0
# bind1	= numactl -m 0 --physcpubind=1
# bind2	= numactl -m 0 --physcpubind=2
# bind3	= numactl -m 0 --physcpubind=3
# bind4	= numactl -m 0 --physcpubind=4
#bind5	= numactl -m 0 --physcpubind=5
# bind6	= numactl -m 0 --physcpubind=6
# bind7	= numactl -m 0 --physcpubind=7


# base - 关向量化
intspeed=base=default:
   COPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbs_zbc -ffp-contract=off  
   CXXOPTIMIZE      = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbs_zbc -ffp-contract=off  
   FOPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbs_zbc -ffp-contract=off 

   EXTRA_LIBS       = -L$(JEMALLOC_PATH)/lib -ljemalloc -lpthread -lm  
   EXTRA_LDFLAGS    = -fuse-ld=lld -static

fpspeed=base=default:
   COPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbs_zbc -ffp-contract=fast     
   CXXOPTIMIZE      = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbs_zbc -ffp-contract=fast  
   FOPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbs_zbc -ffp-contract=fast 

   EXTRA_LIBS       = -L$(JEMALLOC_PATH)/lib -ljemalloc -lpthread -lm  
   EXTRA_LDFLAGS    = -fuse-ld=lld -static

# base - 关向量化
intrate=base=default:
   COPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbc_zbs -ffp-contract=off  
   CXXOPTIMIZE      = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbc_zbs -ffp-contract=off  
   FOPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbc_zbs -ffp-contract=off 

   EXTRA_LIBS       = -L$(JEMALLOC_PATH)/lib -ljemalloc -lpthread -lm  
   EXTRA_LDFLAGS    = -fuse-ld=lld -static

fprate=base=default:
   COPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbc_zbs -ffp-contract=fast     
   CXXOPTIMIZE      = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbc_zbs -ffp-contract=fast  
   FOPTIMIZE        = -O3 -flto -ffast-math -march=rv64gc_zba_zbb_zbc_zbs -ffp-contract=fast 

   EXTRA_LIBS       = -L$(JEMALLOC_PATH)/lib -ljemalloc -lpthread -lm  
   EXTRA_LDFLAGS    = -fuse-ld=lld -static

#-------------------------------------------------------------------------------
# Tester and System Descriptions - EDIT the sections below
#-------------------------------------------------------------------------------
#   For info about any field, see
#             https://www.spec.org/cpu2017/Docs/config.html#fieldname
#   Example:  https://www.spec.org/cpu2017/Docs/config.html#hw_memory
#-------------------------------------------------------------------------------

#--------- If you install new compilers, EDIT this section --------------------

intrate,intspeed,fpspeed,fprate:
   sw_compiler001   = LLVM 22 (clang/clang++/flang-new)
   sw_base_ptrsize  = 64-bit
   sw_peak_ptrsize  = Not Applicable

#--------- EDIT Your info ---------------------------------------------------------
# To understand the difference between hw_vendor/sponsor/tester, see:
#     www.spec.org/cpu2017/Docs/config.html#test_sponsor
intrate,intspeed,fprate,fpspeed: # Important: keep this line
   hw_vendor          = SpacemiT
   tester             = kdh
   test_sponsor       = SpacemiT
   license_num        = 9999
   prepared_by        = kdh

#--------- EDIT system availability dates and system information ----------------------------------------------
intrate,intspeed,fprate,fpspeed: # Important: keep this line
   hw_avail           = Dec-9999
   sw_avail           = Dec-9999
   hw_cpu_nominal_mhz = 1600
   hw_cpu_max_mhz     = 1600
   hw_ncores          = 8
   hw_nthreadspercore = 1
   hw_ncpuorder       = 1 chip
   hw_model           = SpacemiT K1
   hw_other           = K1 8-core 64-bit RISC-V AI CPU
   sw_other           = None
   hw_pcache          = 32 KB I + 32 KB D on chip per core
   hw_scache          = 512 KB I+D on chip per 4-core cluster
   hw_tcache          = None
   hw_ocache          = None
   hw_memory001       = 16 GiB

#--------- Sysinfo fields - You may need to adjust this section ---------------
# Note: Some commented-out fields above are automatically set to preliminary
# values by sysinfo
#       www.spec.org/cpu2017/Docs/config.html#sysinfo
# Uncomment lines for which you already have a better answer than sysinfo
#
intrate,intspeed,fprate,fpspeed: # Important: keep this line
   hw_cpu_name        = Spacemit(R) X60
   hw_disk            = 4 8M disk
   hw_nchips          = 1
   sw_file            = ext4
   sw_state           = multi-user.target
   sw_os001           = Bianbu 2.1
